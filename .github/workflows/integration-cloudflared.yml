# Manual-only: real Cloudflare quick tunnel (network + cloudflared download/cache).
# Run from Actions → Integration (cloudflared) → Run workflow.

name: Integration (cloudflared)

on:
  workflow_dispatch:

jobs:
  cloudflared-quick-tunnel:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run quick tunnel tests (smoke + E2E)
        env:
          BUNCARGO_TEST_CLOUDFLARED_SMOKE: "1"
          BUNCARGO_TEST_CLOUDFLARED_E2E: "1"
        run: bun test src/core/quick-tunnel/quick-tunnel.test.ts
